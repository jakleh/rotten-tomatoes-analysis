<div id="plotly-chart"></div>
<span id="chart-loading" class="htmx-indicator">Loading chart...</span>
<script>
(function() {
    var el = document.getElementById("plotly-chart");
    var spec = {{ chart_json | safe }};
    var layout = Object.assign({}, spec.layout, {
        autosize: false,
        width: el.parentElement.clientWidth - 32,
        height: spec.layout.height || 400
    });
    Plotly.newPlot(el, spec.data, layout, {displayModeBar: false});
})();
</script>
