{% extends "base.html" %}

{% block title %}Reviews — RT Dashboard{% endblock %}
{% block nav_reviews %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Reviews</h1>
    <div class="controls">
        <select id="movie-filter"
                hx-get="/reviews/table"
                hx-target="#review-table-container"
                hx-include=".review-filter"
                hx-trigger="change"
                name="movie"
                class="review-filter">
            <option value="all" {% if selected_movie == "all" %}selected{% endif %}>All Movies</option>
            {% for slug in movies %}
            <option value="{{ slug }}" {% if selected_movie == slug %}selected{% endif %}>
                {{ slug | replace("_", " ") | title }}
            </option>
            {% endfor %}
        </select>
        <label class="date-filter-label" for="after-filter">After:</label>
        <input type="date"
               id="after-filter"
               name="after"
               class="review-filter"
               value="{{ selected_after or '' }}"
               hx-get="/reviews/table"
               hx-target="#review-table-container"
               hx-include=".review-filter"
               hx-trigger="change">
    </div>
</div>

<div id="review-table-container">
    {% include "partials/review_table.html" %}
</div>
{% endblock %}
