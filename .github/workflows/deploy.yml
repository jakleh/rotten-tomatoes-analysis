name: Deploy to GCP VM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rotten_tomatoes.py"
      - "movies.json"
      - "pyproject.toml"
      - "deploy/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy files to VM
        run: |
          gcloud compute scp \
            rotten_tomatoes.py \
            movies.json \
            jakelehner@rt-scraper:~/rotten-tomatoes-analysis/ \
            --zone=us-east1-b \
            --quiet

      - name: Sync dependencies on VM
        run: |
          gcloud compute ssh jakelehner@rt-scraper \
            --zone=us-east1-b \
            --quiet \
            --command="cd ~/rotten-tomatoes-analysis && ~/.local/bin/uv sync"
